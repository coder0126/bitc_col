<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact form</title>
</head>
<body>
    
</body>
<head>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #d197c4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: rgb(206, 101, 150);
            padding: 25px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #ff66b2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #b30062;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Contact Form</h2>

        <form>
            <label>Full Name</label>
            <input type="text" name="fullname" placeholder="Enter your full name" required>

            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your active email" required>

            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="Enter your phone number" required>

            <label>Subject Line</label>
            <input type="text" name="subject" placeholder="Enter subject" required>

            <label>Message</label>
            <textarea name="message" placeholder="Write your  personal message here" required></textarea>

            <button type="submit">All done👋🏽</button>
        </form>
    </div>

</body>
</html>
